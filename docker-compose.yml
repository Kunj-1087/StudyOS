version: '3.8'

services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: studyos-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: studyos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studyos-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@db:5432/studyos?schema=public
      JWT_SECRET: docker_secret_key
      REFRESH_SECRET: docker_refresh_secret
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && npm start"

  # Frontend (Static Serve or Dev)
  # For this example, we assume we want to run the dev server or a build
  frontend:
    image: node:18-alpine
    container_name: studyos-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    command: npm run dev -- --host

volumes:
  postgres_data:
